    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
    <script>
    function checkAccess() {
        const now = Date.now();

        const isPaid = localStorage.getItem('aihubpro_paid') === 'true';
        const paidExpiry = localStorage.getItem('aihubpro_paid_expiry');
        if (isPaid && paidExpiry && now < parseInt(paidExpiry)) return true;
        if (!trialStart) { localStorage.setItem('aihubpro_trial_start', now.toString()); return true; }
        const elapsed = Math.floor((now - parseInt(trialStart)) / 1000);
        if (elapsed < 300) return true;
        const nextFree = parseInt(trialStart) + (24 * 60 * 60 * 1000);
        if (now < nextFree) { alert('⏰ 5 Minute Free Trial Khatam!\n\nAgla Free Access: ' + new Date(nextFree).toLocaleString('hi-IN') + '\n\n⚖️ Jurisdiction: Yamunanagar Court Only'); window.location.href = '/'; return false; }
        localStorage.removeItem('aihubpro_trial_start'); return true;
    }
    const AIHUB_ADS = { client: 'ca-pub-XXXXXXXXXXXXXXXX', getConfig: () => { if (!localStorage.getItem('aihubpro_ads_master')) { localStorage.setItem('aihubpro_ads_master', JSON.stringify({ show_666: true, show_999: false, show_free: false })); } return JSON.parse(localStorage.getItem('aihubpro_ads_master')); }, canShow: () => { const plan = localStorage.getItem('aihubpro_plan'); const paid = localStorage.getItem('aihubpro_paid') === 'true'; const cfg = AIHUB_ADS.getConfig(); if (!paid) return false; if (plan === '666' && cfg.show_666) return true; if (plan === '999' && cfg.show_999) return true; return false; }, load: () => { if (!AIHUB_ADS.canShow()) return; const adCode = `<ins class="adsbygoogle" style="display:block" data-ad-client="${AIHUB_ADS.client}" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>`; document.querySelectorAll('.aihub-ad-box').forEach(box => { box.innerHTML = adCode; box.style.display = 'block'; }); (adsbygoogle = window.adsbygoogle || []).push({}); } };
    if (!checkAccess()) { document.body.innerHTML = '<h1 style="text-align:center;margin-top:50px;color:#ef4444;font-family:system-ui;">Access Blocked - Buy Plan<br><small style="font-size:16px;color:#94a3b8;">⚖️ Yamunanagar Court, Haryana</small></h1>'; } else { document.addEventListener('DOMContentLoaded', AIHUB_ADS.load); }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- ===== SYSTEM END ===== -->
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f1f5f9; font-family: system-ui; padding: 20px; padding-bottom: 70px; }
.container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #3b82f6; text-align: center; margin-bottom: 10px; }
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 14px; }
.tool-box { background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        input, button, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #334155; color: white; font-size: 14px; }
        button { background: #3b82f6; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #2563eb; }
.back-btn { background: #475569; width: auto; padding: 8px 16px; margin-bottom: 20px; }
.aihub-ad-box { display: none; text-align: center; margin: 20px auto; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; max-width: 728px; }
.footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; padding: 10px; text-align: center; font-size: 11px; color: #94a3b8; border-top: 1px solid #334155; z-index: 100; }
.tabs { display: flex; gap: 10px; margin: 20px 0; border-bottom: 2px solid #334155; flex-wrap: wrap; }
.tab { padding: 12px 20px; background: #334155; border: none; border-radius: 8px 8px 0 0; color: #94a3b8; cursor: pointer; font-weight: 600; }
.tab.active { background: #3b82f6; color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
.qr-container { background: white; padding: 30px; border-radius: 12px; text-align: center; min-height: 350px; display: flex; align-items: center; justify-content: center; }
.qr-container canvas,.qr-container img { max-width: 100%; }
.btn-success { background: #10b981; }
.btn-success:hover { background: #059669; }
  label { display: block; color: #cbd5e1; font-size: 13px; margin-top: 12px; margin-bottom: 6px; font-weight: 500; }
.color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
   @media (max-width: 768px) {.grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.location.href='/'" class="back-btn">← Back to Home</button>
        <h1>📱 QR Code Generator</h1>
        <p class="subtitle">Create QR Codes for Text, URL, WiFi, Contact, UPI - Custom Colors & Logo</p>
        
        <div class="aihub-ad-box"></div>
        
        <div class="tool-box">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('text')">Text/URL</button>
                <button class="tab" onclick="switchTab('wifi')">WiFi</button>
                <button class="tab" onclick="switchTab('contact')">Contact</button>
                <button class="tab" onclick="switchTab('upi')">UPI</button>
            </div>
            
            <div class="aihub-ad-box"></div>
            
            <div class="grid">
                <div>
                    <div id="text-tab" class="tab-content active">
                        <label>Enter Text or URL:</label>
                        <textarea id="textInput" rows="4" placeholder="https://example.com or any text"></textarea>
                    </div>
                    
                    <div id="wifi-tab" class="tab-content">
                        <label>WiFi Network Name [SSID]:</label>
                        <input type="text" id="wifiSSID" placeholder="MyWiFi">
                        <label>Password:</label>
                        <input type="text" id="wifiPass" placeholder="password123">
                        <label>Encryption:</label>
                        <select id="wifiEnc">
                            <option value="WPA">WPA/WPA2</option>
                            <option value="WEP">WEP</option>
                            <option value="nopass">No Password</option>
                        </select>
                    </div>
                    
                    <div id="contact-tab" class="tab-content">
                        <label>Full Name:</label>
                        <input type="text" id="contactName" placeholder="John Doe">
                        <label>Phone:</label>
                        <input type="text" id="contactPhone" placeholder="+91 98765 43210">
                        <label>Email:</label>
                        <input type="email" id="contactEmail" placeholder="john@example.com">
                        <label>Company:</label>
                        <input type="text" id="contactOrg" placeholder="Company Name">
                    </div>
                    
                    <div id="upi-tab" class="tab-content">
                        <label>UPI ID:</label>
                        <input type="text" id="upiId" placeholder="yourname@upi">
                        <label>Payee Name:</label>
                        <input type="text" id="upiName" placeholder="Your Name">
                        <label>Amount [Optional]:</label>
                        <input type="number" id="upiAmount" placeholder="100">
                    </div>
                    
                    <div class="color-row">
                        <div>
                            <label>Size:</label>
                            <select id="qrSize">
                                <option value="256">256x256</option>
                                <option value="512" selected>512x512</option>
                                <option value="1024">1024x1024</option>
                            </select>
                        </div>
                        <div>
                            <label>Error Correction:</label>
                            <select id="errorLevel">
                                <option value="L">Low [7%]</option>
                                <option value="M" selected>Medium [15%]</option>
                                <option value="Q">Quartile [25%]</option>
                                <option value="H">High [30%]</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="color-row">
                        <div>
                            <label>Foreground:</label>
                            <input type="color" id="fgColor" value="#000000">
                        </div>
                        <div>
                            <label>Background:</label>
                            <input type="color" id="bgColor" value="#ffffff">
                        </div>
                    </div>
                    
                    <button onclick="generateQR()">Generate QR Code</button>
                    <button onclick="downloadQR()" class="btn-success" id="downloadBtn" style="display:none;">⬇️ Download PNG</button>
                </div>
                
                <div>
                    <div class="qr-container" id="qrcode">
                        <div style="color:#64748b;">QR Code will appear here</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="aihub-ad-box"></div>
        
        <div class="footer">
            ⚖️ Jurisdiction: Yamunanagar District Court, Haryana Only | IT Act 2000 Sec 79 Compliant | AIHubPro
        </div>
    </div>
    
    <script>
        let currentTab = 'text';
        let qrCode = null;
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        function getQRData() {
            switch(currentTab) {
                case 'text':
                    return document.getElementById('textInput').value;
                case 'wifi':
                    const ssid = document.getElementById('wifiSSID').value;
                    const pass = document.getElementById('wifiPass').value;
                    const enc = document.getElementById('wifiEnc').value;
                    if (!ssid) return '';
                    return `WIFI:T:${enc};S:${ssid};P:${pass};;`;
                case 'contact':
                    const name = document.getElementById('contactName').value;
                    const phone = document.getElementById('contactPhone').value;
                    const email = document.getElementById('contactEmail').value;
                    const org = document.getElementById('contactOrg').value;
                    if (!name) return '';
                    return `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nORG:${org}\nEND:VCARD`;
                case 'upi':
                    const upiId = document.getElementById('upiId').value;
                    const upiName = document.getElementById('upiName').value;
                    const upiAmount = document.getElementById('upiAmount').value;
                    if (!upiId || !upiName) return '';
                    let upiStr = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(upiName)}`;
                    if (upiAmount) upiStr += `&am=${upiAmount}`;
                    return upiStr;
                default:
                    return '';
            }
        }
        
        function generateQR() {
            const qrData = getQRData();
            if (!qrData) { alert('Please fill all required fields'); return; }
            
            const size = parseInt(document.getElementById('qrSize').value);
            const level = document.getElementById('errorLevel').value;
            const fgColor = document.getElementById('fgColor').value;
            const bgColor = document.getElementById('bgColor').value;
            
            document.getElementById('qrcode').innerHTML = '';
            qrCode = new QRCode(document.getElementById('qrcode'), {
                text: qrData,
                width: size,
                height: size,
                colorDark: fgColor,
                colorLight: bgColor,
                correctLevel: QRCode.CorrectLevel[level]
            });
            
            document.getElementById('downloadBtn').style.display = 'block';
        }
        
        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) { alert('Generate QR code first'); return; }
            const url = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = url;
            a.download = `qrcode-${currentTab}.png`;
            a.click();
        }
    </script>
</body>
</html>
