<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator - AIHubPro</title>
    
    <!-- ===== AIHUBPRO COMPLETE SYSTEM ===== -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
    <script>
    function checkAccess() {
        const now = Date.now();
        const trialStart = localStorage.getItem('aihubpro_trial_start');
        const isPaid = localStorage.getItem('aihubpro_paid') === 'true';
        const paidExpiry = localStorage.getItem('aihubpro_paid_expiry');
        if (isPaid && paidExpiry && now < parseInt(paidExpiry)) return true;
        if (!trialStart) { localStorage.setItem('aihubpro_trial_start', now.toString()); return true; }
        const elapsed = Math.floor((now - parseInt(trialStart)) / 1000);
        if (elapsed < 300) return true;
        const nextFree = parseInt(trialStart) + (24 * 60 * 60 * 1000);
        if (now < nextFree) { alert('⏰ 5 Minute Free Trial Khatam!\n\nAgla Free Access: ' + new Date(nextFree).toLocaleString('hi-IN') + '\n\n⚖️ Jurisdiction: Yamunanagar Court Only'); window.location.href = '/'; return false; }
        localStorage.removeItem('aihubpro_trial_start'); return true;
    }
    const AIHUB_ADS = { client: 'ca-pub-XXXXXXXXXXXXXXXX', getConfig: () => { if (!localStorage.getItem('aihubpro_ads_master')) { localStorage.setItem('aihubpro_ads_master', JSON.stringify({ show_666: true, show_999: false, show_free: false })); } return JSON.parse(localStorage.getItem('aihubpro_ads_master')); }, canShow: () => { const plan = localStorage.getItem('aihubpro_plan'); const paid = localStorage.getItem('aihubpro_paid') === 'true'; const cfg = AIHUB_ADS.getConfig(); if (!paid) return false; if (plan === '666' && cfg.show_666) return true; if (plan === '999' && cfg.show_999) return true; return false; }, load: () => { if (!AIHUB_ADS.canShow()) return; const adCode = `<ins class="adsbygoogle" style="display:block" data-ad-client="${AIHUB_ADS.client}" data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>`; document.querySelectorAll('.aihub-ad-box').forEach(box => { box.innerHTML = adCode; box.style.display = 'block'; }); (adsbygoogle = window.adsbygoogle || []).push({}); } };
    if (!checkAccess()) { document.body.innerHTML = '<h1 style="text-align:center;margin-top:50px;color:#ef4444;font-family:system-ui;">Access Blocked - Buy Plan<br><small style="font-size:16px;color:#94a3b8;">⚖️ Yamunanagar Court, Haryana</small></h1>'; } else { document.addEventListener('DOMContentLoaded', AIHUB_ADS.load); }
    </script>
    <!-- ===== SYSTEM END ===== -->
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f1f5f9; font-family: system-ui; padding: 20px; padding-bottom: 70px; }
       .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #3b82f6; text-align: center; margin-bottom: 20px; }
       .tool-box { background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #334155; color: white; font-size: 14px; }
        button { background: #3b82f6; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
       .back-btn { background: #475569; width: auto; padding: 8px 16px; margin-bottom: 20px; }
       .aihub-ad-box { display: none; text-align: center; margin: 20px auto; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; max-width: 728px; }
       .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; padding: 10px; text-align: center; font-size: 11px; color: #94a3b8; border-top: 1px solid #334155; }
       .result { background: #0f172a; padding: 20px; border-radius: 8px; margin-top: 20px; }
       .result h3 { color: #10b981; margin-bottom: 15px; }
       .result p { margin: 8px 0; font-size: 16px; }
       .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
       .result-card { background: #1e293b; padding: 15px; border-radius: 8px; text-align: center; }
       .result-card .label { font-size: 12px; color: #94a3b8; }
       .result-card .value { font-size: 20px; color: #3b82f6; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.location.href='/'" class="back-btn">← Back to Home</button>
        <h1>💰 EMI Calculator</h1>
        
        <div class="aihub-ad-box"></div>
        
        <div class="tool-box">
            <label>Loan Amount ₹:</label>
            <input type="number" id="loan" placeholder="500000" value="500000">
            <label>Interest Rate % per year:</label>
            <input type="number" id="rate" placeholder="8.5" step="0.01" value="8.5">
            <label>Loan Tenure [Years]:</label>
            <input type="number" id="time" placeholder="5" value="5">
            
            <div class="aihub-ad-box"></div>
            
            <button onclick="calcEMI()">Calculate EMI</button>
            <div id="result" class="result"></div>
        </div>
        
        <div class="aihub-ad-box"></div>
        
        <div class="footer">
            ⚖️ Jurisdiction: Yamunanagar District Court, Haryana Only | IT Act 2000 Sec 79 Compliant
        </div>
    </div>
    
    <script>
        function calcEMI() {
            const p = parseFloat(document.getElementById('loan').value);
            const r = parseFloat(document.getElementById('rate').value) / 12 / 100;
            const n = parseFloat(document.getElementById('time').value) * 12;
            if (!p ||!r ||!n) { alert('Please fill all fields'); return; }
            const emi = (p * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            const total = emi * n;
            const interest = total - p;
            document.getElementById('result').innerHTML = `
                <h3>📊 EMI Calculation Result:</h3>
                <div class="result-grid">
                    <div class="result-card">
                        <div class="label">Monthly EMI</div>
                        <div class="value">₹${emi.toFixed(0)}</div>
                    </div>
                    <div class="result-card">
                        <div class="label">Total Interest</div>
                        <div class="value">₹${interest.toFixed(0)}</div>
                    </div>
                    <div class="result-card">
                        <div class="label">Principal Amount</div>
                        <div class="value">₹${p.toFixed(0)}</div>
                    </div>
                    <div class="result-card">
                        <div class="label">Total Payable</div>
                        <div class="value">₹${total.toFixed(0)}</div>
                    </div>
                </div>
            `;
        }
        // Auto calculate on load
        window.onload = calcEMI;
    </script>
</body>
</html>
