<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIHubPro - Triple Engine AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #FFD700; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
       .container { max-width: 900px; width: 100%; }
       .header { text-align: center; margin-bottom: 20px; }
        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 10px; 
            text-shadow: 0 0 15px #FFD700; 
        }
       .status { 
            font-size: 0.9rem; 
            color: #00ff00; 
            margin-bottom: 15px; 
            padding: 8px 16px; 
            background: #111; 
            border-radius: 5px; 
            display: inline-block; 
        }
       .status.error { color: #ff4444; }
        #chat { 
            height: 500px; 
            overflow-y: auto; 
            border: 2px solid #FFD700; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 20px; 
            background: #0a0a0a; 
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); 
        }
        #chat::-webkit-scrollbar { width: 8px; }
        #chat::-webkit-scrollbar-track { background: #111; }
        #chat::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
       .msg { 
            margin: 15px 0; 
            padding: 12px 18px; 
            border-radius: 12px; 
            animation: slideIn 0.3s; 
            word-wrap: break-word; 
            line-height: 1.5;
        }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
       .user { 
            background: #333; 
            color: #fff; 
            text-align: right; 
            margin-left: 20%; 
        }
       .ai { 
            background: #1a1a1a; 
            color: #FFD700; 
            border-left: 4px solid #FFD700; 
            margin-right: 20%; 
        }
       .engine { 
            font-size: 0.75rem; 
            color: #00ff00; 
            opacity: 0.8; 
            margin-top: 8px; 
            font-style: italic; 
        }
        #input-area { display: flex; gap: 12px; }
        #userInput { 
            flex: 1; 
            padding: 15px; 
            background: #111; 
            border: 2px solid #FFD700; 
            color: #FFD700; 
            border-radius: 10px; 
            font-size: 1rem; 
            outline: none; 
        }
        #userInput:focus { 
            border-color: #fff; 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); 
        }
        button { 
            padding: 15px 30px; 
            background: #FFD700; 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { 
            background: #fff; 
            transform: scale(1.05); 
        }
        button:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }
       .typing { display: inline-block; }
       .typing span { 
            animation: blink 1.4s infinite; 
            font-size: 1.5rem;
        }
       .typing span:nth-child(2) { animation-delay: 0.2s; }
       .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 
            0%, 80%, 100% { opacity: 0; } 
            40% { opacity: 1; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ AIHubPro Triple Engine</h1>
            <div class="status" id="status">Engine: Ready</div>
        </div>
        <div id="chat"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off" />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

<script>
const chat = document.getElementById('chat');
const status = document.getElementById('status');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { 
        e.preventDefault(); 
        sendMessage(); 
    }
});

function setStatus(text, isError = false) {
    status.textContent = text;
    status.className = isError ? 'status error' : 'status';
}

function addMessage(text, sender, engine = '') {
    const msgDiv = document.createElement('div');
    msgDiv.className = `msg ${sender}`;
    msgDiv.innerHTML = text + (engine ? `<div class="engine">⚡ ${engine}</div>` : '');
    chat.appendChild(msgDiv);
    chat.scrollTop = chat.scrollHeight;
    return msgDiv;
}

function addTypingIndicator() {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg ai';
    msgDiv.innerHTML = '<div class="typing"><span>.</span><span>.</span><span>.</span></div>';
    chat.appendChild(msgDiv);
    chat.scrollTop = chat.scrollHeight;
    return msgDiv;
}

async function sendMessage() {
    const prompt = userInput.value.trim();
    if (!prompt) return;
    
    addMessage(prompt, 'user');
    userInput.value = '';
    sendBtn.disabled = true;
    userInput.disabled = true;
    
    const typingMsg = addTypingIndicator();
    setStatus('Engine: Thinking...');
    
    try {
        const res = await fetch('/.netlify/functions/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });
        
        const data = await res.json();
        typingMsg.remove();
        
        if (res.ok) {
            addMessage(data.reply, 'ai', data.engine);
            setStatus('Engine: Ready');
        } else {
            addMessage(`❌ Error: ${data.error || 'Unknown error'}`, 'ai', 'Error');
            setStatus('Engine: Failed', true);
        }
    } catch (e) {
        typingMsg.remove();
        addMessage(`❌ Network Error: ${e.message}`, 'ai', 'Error');
        setStatus('Engine: Failed', true);
    }
    
    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
}

addMessage('👋 Welcome! Keys ab 100% safe hain. Ask me anything!', 'ai', 'System');
userInput.focus();
</script>
</body>
</html>
