<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - AIHubPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #FFD700; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tick { 
            font-size: 100px; 
            margin-bottom: 20px;
            animation: bounce 0.6s;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        h1 { font-size: 48px; margin-bottom: 15px; text-shadow: 0 0 15px #FFD700; }
        h2 { font-size: 24px; margin-bottom: 20px; color: #00ff00; }
        p { font-size: 18px; margin-bottom: 30px; line-height: 1.6; }
        .btn {
            display: inline-block;
            color: #000; 
            background: #FFD700;
            font-size: 20px; 
            text-decoration: none; 
            border: 2px solid #FFD700; 
            padding: 15px 40px; 
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .btn:hover { 
            background: #fff; 
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }
        .features {
            margin-top: 40px;
            text-align: left;
            display: inline-block;
        }
        .features div {
            margin: 10px 0;
            font-size: 16px;
        }
        .features div:before {
            content: "✓ ";
            color: #00ff00;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tick">✅</div>
        <h1>Payment Successful!</h1>
        <h2>Welcome to AIHubPro PRO</h2>
        <p>Ab aapka subscription active ho gaya hai. All premium features unlocked.</p>
        
        <div class="features">
            <div>Triple Engine AI - Groq + Gemini + HuggingFace</div>
            <div>Unlimited AI Chats</div>
            <div>Priority Support</div>
            <div>No Rate Limits</div>
        </div>
        
        <br><br>
        <a href="/chat.html" class="btn">Start AI Chat →</a>
    </div>
</body>
</html>
